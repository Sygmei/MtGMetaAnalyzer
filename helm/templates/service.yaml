apiVersion: v1
kind: Service
metadata:
  name: mtgmetaanalyzer-service
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  selector:
    app: mtgmetaanalyzer
