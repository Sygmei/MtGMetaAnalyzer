apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mtgmetaanalyzer-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Release.Namespace }}-https-redirect-mw@kubernetescrd"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - "{{ .Values.ingress.domain }}"
        - "www.{{ .Values.ingress.domain }}"
      secretName: mtgmetaanalyzer-cert-tls
  rules:
    - host: "{{ .Values.ingress.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mtgmetaanalyzer-service
                port:
                  number: 3000
          - path: /progress
            pathType: Prefix
            backend:
              service:
                name: mtgmetaanalyzer-service
                port:
                  number: 3210

    - host: "www.{{ .Values.ingress.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mtgmetaanalyzer-service
                port:
                  number: 3000
          - path: /progress
            pathType: Prefix
            backend:
              service:
                name: mtgmetaanalyzer-service
                port:
                  number: 3210
