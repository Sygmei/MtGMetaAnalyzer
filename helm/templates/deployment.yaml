{{- $name := "mtgmetaanalyzer" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "mtgmetaanalyzer-deployment"
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: "mtgmetaanalyzer"
  template:
    metadata:
      labels:
        app: "mtgmetaanalyzer"
      annotations:
        mtgmetaanalyzer/version: "{{ .Values.version }}"
        mtgmetaanalyzer/release-revision: "{{ .Release.Revision }}"
    spec:
      containers:
        - name: "mtgmetaanalyzer"
          image: "ghcr.io/sygmei/mtgmetaanalyzer:{{ .Values.version }}"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: MIGRATE_MAX_ATTEMPTS
              value: "60"
            - name: MIGRATE_RETRY_DELAY_SECONDS
              value: "2"
            - name: OTEL_ENABLED
              value: {{ .Values.otel.enabled | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: {{ .Values.otel.tracesEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: PUBLIC_FARO_ENABLED
              value: {{ .Values.faro.enabled | quote }}
            - name: PUBLIC_FARO_URL
              value: {{ .Values.faro.endpoint | quote }}
            - name: PUBLIC_FARO_APP_NAME
              value: {{ .Values.faro.appName | quote }}
            - name: PUBLIC_FARO_APP_VERSION
              value: {{ .Values.faro.appVersion | default .Values.version | quote }}
            - name: DATABASE_URL_RW
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: connection-string
            - name: DATABASE_URL_RO
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: connection-string-ro
            - name: DATABASE_URL_ADMIN
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: connection-string-admin
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "2Gi"
